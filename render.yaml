databases:
  - name: black-elixir-db
    databaseName: black_elixir
    user: black_elixir
    plan: free

services:
  - type: web
    name: black-elixir
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn black_elixir.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120"
    healthCheckPath: /cs/
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DATABASE_URL
        fromDatabase:
          name: black-elixir-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "2"
    autoDeploy: true
