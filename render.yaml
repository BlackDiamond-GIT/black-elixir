databases:
  - name: black-elixir-db
    databaseName: black_elixir
    user: black_elixir
    plan: basic-256mb
    region: oregon

services:
  - type: web
    name: black-elixir
    runtime: python
    plan: starter
    region: oregon
    buildCommand: "./build.sh"
    preDeployCommand: python manage.py migrate --no-input && python manage.py bootstrap_site
    startCommand: gunicorn black_elixir.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /healthz/
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DATABASE_URL
        fromDatabase:
          name: black-elixir-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: SITE_DOMAIN
        value: black-elixir.cz
      - key: SITE_WHATSAPP
        value: "+420777123456"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: HUB_API_URL
        value: https://tantra-prague.com
      - key: HUB_API_KEY
        sync: false
    autoDeploy: true
