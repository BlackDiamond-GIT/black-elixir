{% load i18n static %}

<div class="flex items-center ml-auto shrink-0">
  <div class="flex flex-row flex-wrap items-center justify-end gap-x-4 gap-y-2 leading-none">
    {% get_current_language as CURRENT_LANG %}
    <a href="{% url 'admin_toggle_lang' %}"
       class="inline-flex items-center min-h-[44px] px-1 text-sm font-semibold tracking-wide text-font-default-light hover:text-font-important-light dark:text-font-default-dark dark:hover:text-font-important-dark"
       title="{% if CURRENT_LANG == 'uk' %}{% translate 'Switch to English' %}{% else %}{% translate 'Switch to Ukrainian' %}{% endif %}">
      {% if CURRENT_LANG == 'uk' %}EN{% else %}UA{% endif %}
    </a>

    {% if site_url %}
      <a href="{{ site_url }}"
         target="_blank"
         rel="noopener noreferrer"
         class="inline-flex items-center min-h-[44px] px-1 text-sm font-semibold tracking-wide text-font-default-light hover:text-font-important-light dark:text-font-default-dark dark:hover:text-font-important-dark">
        {% translate 'View site' %}
      </a>
    {% endif %}

    {% if user.has_usable_password %}
      <a href="{% url 'admin:password_change' %}"
         class="inline-flex items-center min-h-[44px] px-1 text-sm font-semibold tracking-wide text-font-default-light hover:text-font-important-light dark:text-font-default-dark dark:hover:text-font-important-dark">
        {% translate 'Change password' %}
      </a>
    {% endif %}

    <form method="post" action="{% url 'admin:logout' %}" class="inline-flex items-center m-0 p-0">
      {% csrf_token %}
      <button type="submit"
              class="inline-flex items-center gap-1 min-h-[44px] px-1 text-sm font-semibold tracking-wide text-red-500 hover:text-red-400 bg-transparent border-0 cursor-pointer dark:text-red-400 dark:hover:text-red-300">
        {% translate 'Log out' %}
        <span class="material-symbols-outlined text-base leading-none" aria-hidden="true">logout</span>
      </button>
    </form>
  </div>
</div>
