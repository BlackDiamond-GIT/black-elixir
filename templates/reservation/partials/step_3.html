{% load i18n %}
<h3 style="margin-bottom: 1rem;">{% trans 'Select a time' %}</h3>
<input type="hidden" name="service_id" value="{{ service.id }}">
<input type="hidden" name="masseuse_id" value="{{ masseuse.id }}">
<div class="time-grid">
  {% for slot in slots %}
  <button type="button" class="time-btn" data-slot-id="{{ slot.id }}" hx-post="{% url 'booking:step' '3' %}" 
          hx-vals='{"slot_id":"{{ slot.id }}"}' hx-target="#booking-content" hx-swap="innerHTML">
    {{ slot.start_time|time:"H:i" }}
  </button>
  {% endfor %}
</div>
<div style="display: flex; gap: 1rem; margin-top: 2rem;">
  <button type="button" class="btn btn--ghost" style="flex: 1;" hx-post="{% url 'booking:step' '2' %}" 
          hx-vals='{"service_id":"{{ service.id }}", "masseuse_id":"{{ masseuse.id }}"}' hx-target="#booking-content" hx-swap="innerHTML">{% trans 'Back' %}</button>
  <button type="button" class="btn btn--primary" style="flex: 1;" disabled>{% trans 'Continue' %}</button>
</div>
